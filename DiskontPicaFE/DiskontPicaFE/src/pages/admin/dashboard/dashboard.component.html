<div class="dashboard-layout">
  <!-- Sidebar Navigation -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="/assets/discontPica.PNG" alt="Diskont Pica Logo" class="brand-logo" />
      <span class="brand-text">Admin</span>
    </div>
    <ul class="sidebar-nav">
      <li>
        <a routerLink="admin-products" routerLinkActive="active" class="nav-item">
          <i class="fa fa-box"></i> Products
        </a>
      </li>
      <li>
        <a routerLink="categories" routerLinkActive="active" class="nav-item">
          <i class="fa fa-tags"></i> Categories
        </a>
      </li>
      <li>
        <a routerLink="orders" routerLinkActive="active" class="nav-item">
          <i class="fa fa-shopping-cart"></i> Orders
        </a>
      </li>
      <li>
        <a routerLink="customers" routerLinkActive="active" class="nav-item">
          <i class="fa fa-users"></i> Customers
        </a>
      </li>
    </ul>
    <div class="sidebar-footer">
      <p>&copy; Diskont Pica Admin</p>
    </div>
  </aside>

  <!-- Main Content Area -->
  <div class="main-content">
    <header class="top-header">
      <div class="header-title">
        <h2>Dashboard</h2>
      </div>
      <div class="header-actions">
        <button class="btn-logout" (click)="logout()">
          <i class="fa fa-sign-out"></i> Log Out
        </button>
      </div>
    </header>
    <main class="content-body">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
