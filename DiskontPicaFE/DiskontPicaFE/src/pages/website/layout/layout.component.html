<nav class="diskont-navbar">
  <div class="nav-container">
    <a class="nav-brand" routerLink="product">
      <img src="/assets/discontPica.PNG" alt="Diskont Pica" class="brand-img" />
      <span class="brand-text">Diskont Pica</span>
    </a>

    <div class="nav-menu">
      <a class="nav-link" routerLink="product" routerLinkActive="active">Products</a>
      <a class="nav-link" *ngIf="isLogged" routerLink="customer-orders" routerLinkActive="active">Your Orders</a>
    </div>

    <div class="nav-actions">
      <!-- Cart Button (always visible) -->
      <div class="cart-wrapper">
        <button class="cart-btn" (click)="toggleCart()" [class.cart-open]="cartOpen" id="navbar-cart-btn">
          <svg class="cart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1" />
            <circle cx="20" cy="21" r="1" />
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
          </svg>
          <span class="cart-badge" *ngIf="cartService.getCart().length > 0">{{ cartService.getCart().length }}</span>
        </button>

        <!-- Cart Dropdown -->
        <div class="cart-dropdown" [class.open]="cartOpen" id="cart-dropdown-panel">
          <div class="cart-dropdown-header">
            <span>🛒 Your Cart</span>
            <button class="close-btn" (click)="toggleCart()">✕</button>
          </div>

          <div class="cart-dropdown-body">
            <div *ngIf="cartService.getCart().length === 0" class="cart-empty">
              <div class="empty-icon">🛍️</div>
              <p>Your cart is empty</p>
            </div>

            @for(item of cartService.getCart(); track item.productId) {
            <div class="dd-cart-item">
              <div class="dd-item-info">
                <span class="dd-item-name">{{ item.name }}</span>
                <span class="dd-item-price">{{ item.price }} € × {{ item.quantity }}</span>
              </div>
              <div class="dd-item-actions">
                <button class="qty-btn" (click)="cartService.decrementQuantity(item.productId)"
                  id="dec-{{item.productId}}">−</button>
                <span class="qty-display">{{ item.quantity }}</span>
                <button class="qty-btn" (click)="cartService.incrementQuantity(item.productId)"
                  id="inc-{{item.productId}}">+</button>
                <button class="remove-btn" (click)="cartService.delete(item)" id="remove-{{item.productId}}">🗑</button>
              </div>
            </div>
            }
          </div>

          <div class="cart-dropdown-footer" *ngIf="cartService.getCart().length > 0">
            <div class="cart-total-row">
              <span>Total:</span>
              <strong>{{ cartService.getTotal() }} €</strong>
            </div>
            <button class="checkout-btn" (click)="checkOut()" id="navbar-checkout-btn">
              Checkout →
            </button>
          </div>
        </div>

        <!-- Backdrop -->
        <div class="cart-backdrop" *ngIf="cartOpen" (click)="toggleCart()"></div>
      </div>

      <button class="btn-primary-outline" *ngIf="!isLogged" (click)="login()">Log In</button>
      <button class="btn-danger-outline" *ngIf="isLogged" (click)="logout()">Log Out</button>
    </div>
  </div>
</nav>
<div class="content-wrapper">
  <router-outlet></router-outlet>
</div>
