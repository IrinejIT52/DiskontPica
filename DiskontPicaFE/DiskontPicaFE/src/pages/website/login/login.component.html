<div class="auth-wrapper">
  <div class="auth-left-pane">
    <div class="brand-overlay">
      <h1>Diskont Pica</h1>
      <p>Premium Beverages at Wholesale Prices</p>
    </div>
  </div>
  <div class="auth-right-pane">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Please enter your details to sign in.</p>
      </div>
      <form class="auth-form">
        <div class="input-group">
          <i class="fa fa-user input-icon"></i>
          <input type="text" [(ngModel)]="principal.name" name="name" placeholder="Username" required>
        </div>
        <div class="input-group">
          <i class="fa fa-lock input-icon"></i>
          <input type="password" [(ngModel)]="principal.password" name="password" placeholder="Password" required>
        </div>
        <button type="button" class="btn-primary" (click)="onLogin()">Sign In</button>
      </form>
      <div class="auth-footer">
        <p>Don't have an account? <a href="javascript:void(0)" (click)="toRegister()">Create one</a></p>
      </div>
    </div>
  </div>
</div>
