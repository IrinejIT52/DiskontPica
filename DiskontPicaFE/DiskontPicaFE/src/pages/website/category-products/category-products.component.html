<div class="products-page">

  <!-- Search Bar -->
  <div class="search-bar-wrapper">
    <div class="search-bar">
      <i class="fa fa-search search-icon"></i>
      <input type="text" class="search-input" placeholder="Search products..." (input)="applyFilter($event)" />
    </div>
  </div>

  <!-- Product Grid -->
  <div class="product-grid">
    @for (product of filteredProducts; track product.productId) {
    <div class="product-card" [class.out-of-stock]="product.stock === 0">

      <!-- Product Image -->
      <div class="product-image-wrapper" [style.background]="getProductGradient(product.name)">
        @if (getProductImage(product.name); as img) {
        <img [src]="img" [alt]="product.name" class="product-img" />
        } @else {
        <span class="product-emoji">{{ getProductEmoji(product.name) }}</span>
        }
        <div class="stock-badge" [class.low-stock]="product.stock < 100">
          {{ product.stock > 0 ? 'In Stock' : 'Out of Stock' }}
        </div>
      </div>

      <!-- Card Body -->
      <div class="product-card-body">
        <h3 class="product-name">{{ product.name }}</h3>
        <p class="product-description">{{ product.description }}</p>
        <div class="product-footer">
          <span class="product-price">{{ product.price | number:'1.2-2' }} €</span>
          <button class="btn-add-cart" (click)="addToCart(product)" [disabled]="product.stock === 0">
            <i class="fa fa-cart-plus"></i> Add
          </button>
        </div>
      </div>

    </div>
    }
  </div>

  <!-- Cart Sidebar -->
  <app-customer-cart></app-customer-cart>

</div>
